version: '3.8'

services:
  database:
    image: mysql:8
    container_name: symfony-demo-crud-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony-demo-crud-php
    restart: unless-stopped
    depends_on:
      - database
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      APP_ENV: dev
      DATABASE_URL: "mysql://app:app@database:3306/app?serverVersion=8.0&charset=utf8mb4"

  postgres:
    image: postgres:13
    container_name: symfony-demo-crud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    container_name: symfony-demo-crud-sonarqube
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli
    container_name: symfony-demo-crud-sonar-scanner
    depends_on:
      - sonarqube
    volumes:
      - .:/usr/src
    environment:
      - SONAR_HOST_URL=http://sonarqube:9000

volumes:
  db_data:
  postgres_data: